kind = "web"
previewPath = "/"
title = "Clash Arena"
version = "1.0.0"
id = "artifacts/clash-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19121

[services.development]
run = "pnpm --filter @workspace/clash-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clash-arena", "run", "build" ]
publicDir = "artifacts/clash-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19121"
BASE_PATH = "/"
